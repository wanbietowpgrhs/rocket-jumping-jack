        <!-- Steps Instructions Grid -->

    <!-- Audio Effects (Web Audio API) -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'reset') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(200, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'star') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'soldier') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            }
        }
    </script>

    <!-- Character Pose Controller Script -->
    <script>
        const character = document.getElementById('character-body');
        const armL = document.getElementById('arm-l');
        const armR = document.getElementById('arm-r');
        const legL = document.getElementById('leg-l');
        const legR = document.getElementById('leg-r');
        const shoeL = document.getElementById('shoe-l');
        const shoeR = document.getElementById('shoe-r');
        const mouth = document.getElementById('mouth');
        const eyeL = document.getElementById('eye-l');
        const eyeR = document.getElementById('eye-r');

        let isLooping = false;
        let loopTimeout;

        // Define the poses for each step
        function playStep(stepKey) {
            // Highlight active button style
            document.querySelectorAll('.btn-step').forEach(btn => {
                btn.classList.remove('ring-4', 'ring-purple-300', 'scale-110');
            });
            const activeBtn = document.getElementById(`btn-step-${stepKey}`);
            if (activeBtn) {
                activeBtn.classList.add('ring-4', 'ring-purple-300', 'scale-110');
            }

            if (stepKey === 'reset') {
                playSound('reset');
                // Pose: Reset (Landing, arms coming down, knees slightly bent)
                character.style.transform = "translateY(5px)";
                armL.setAttribute('d', 'M 85 100 L 65 125');
                armR.setAttribute('d', 'M 115 100 L 135 125');
                legL.setAttribute('d', 'M 94 140 L 90 175');
                legR.setAttribute('d', 'M 108 140 L 112 175');
                shoeL.setAttribute('d', 'M 84 175 L 92 175');
                shoeR.setAttribute('d', 'M 110 175 L 118 175');
                mouth.setAttribute('d', 'M 94 77 Q 100 85 106 77');
                eyeL.setAttribute('r', '3');
                eyeR.setAttribute('r', '3');
            } 
            else if (stepKey === 'star1' || stepKey === 'star2') {
                playSound('star');
                // Pose: Star (Arms wide, legs wide)
                character.style.transform = "translateY(0px)";
                armL.setAttribute('d', 'M 85 100 L 50 95');
                armR.setAttribute('d', 'M 115 100 L 150 95');
                legL.setAttribute('d', 'M 92 140 L 75 172');
                legR.setAttribute('d', 'M 108 140 L 125 172');
                shoeL.setAttribute('d', 'M 68 172 L 77 170');
                shoeR.setAttribute('d', 'M 123 170 L 132 172');
                mouth.setAttribute('d', 'M 92 78 Q 100 88 108 78');
                eyeL.setAttribute('r', '3.5');
                eyeR.setAttribute('r', '3.5');
            } 
            else if (stepKey === 'jump') {
                playSound('jump');
                // Pose: Jump (Arms up high, LEGS TOGETHER, jumping up!)
                character.style.transform = "translateY(-25px)";
                armL.setAttribute('d', 'M 85 100 L 75 55');
                armR.setAttribute('d', 'M 115 100 L 125 55');
                legL.setAttribute('d', 'M 94 140 L 94 175');
                legR.setAttribute('d', 'M 106 140 L 106 175');
                shoeL.setAttribute('d', 'M 88 175 L 96 175');
                shoeR.setAttribute('d', 'M 104 175 L 112 175');
                mouth.setAttribute('d', 'M 92 75 Q 100 92 108 75');
                eyeL.setAttribute('r', '4');
                eyeR.setAttribute('r', '4');
            } 
            else if (stepKey === 'soldier') {
                playSound('soldier');
                // Pose: Soldier (Arms down, legs together)
                character.style.transform = "translateY(0px)";
                armL.setAttribute('d', 'M 85 100 L 80 135');
                armR.setAttribute('d', 'M 115 100 L 120 135');
                legL.setAttribute('d', 'M 94 140 L 94 175');
                legR.setAttribute('d', 'M 106 140 L 106 175');
                shoeL.setAttribute('d', 'M 88 175 L 96 175');
                shoeR.setAttribute('d', 'M 104 175 L 112 175');
                mouth.setAttribute('d', 'M 95 78 Q 100 83 105 78');
                eyeL.setAttribute('r', '3');
                eyeR.setAttribute('r', '3');
            }
        }

        // Auto-run loop animation (Reset -> Star 1 -> Jump -> Star 2 -> Soldier)
        function animateLoop() {
            const loopBtn = document.getElementById('btn-loop');
            const btnText = document.getElementById('loop-btn-text');
            
            if (isLooping) {
                isLooping = false;
                clearTimeout(loopTimeout);
                btnText.innerText = "播放完整連續動作！";
                loopBtn.classList.remove('from-red-500', 'to-orange-500');
                loopBtn.classList.add('from-purple-500', 'to-pink-500');
                playStep('reset');
            } else {
                isLooping = true;
                btnText.innerText = "停止跳躍！";
                loopBtn.classList.remove('from-purple-500', 'to-pink-500');
                loopBtn.classList.add('from-red-500', 'to-orange-500');
                
                const sequence = ['reset', 'star1', 'jump', 'star2', 'soldier']; 
                let seqIndex = 0;

                function runNext() {
                    if (!isLooping) return;
                    playStep(sequence[seqIndex]);
                    seqIndex = (seqIndex + 1) % sequence.length;
                    loopTimeout = setTimeout(runNext, 900); // Slightly slower for better readability of text
                }
                runNext();
            }
        }

        // Initialize with Reset
        window.onload = () => {
            playStep('reset');
        };
    </script>
